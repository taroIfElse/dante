<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ruleta Tattoo</title>
  <style>
    :root {
      --bg: #0c0c0f;
      --bg-elevated: #16161c;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #dc2626;
      --accent-hover: #ef4444;
      --ring: rgba(255, 255, 255, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 4vw, 2rem);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, #2a1215 0%, transparent 50%),
        var(--bg);
      color: var(--text);
      text-align: center;
    }

    main {
      width: 100%;
      max-width: 28rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 1.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    h1 span {
      display: block;
      margin-top: 0.35rem;
      font-size: 0.85em;
      font-weight: 500;
      color: var(--muted);
    }

    .wheel-wrap {
      position: relative;
      width: min(100%, 22rem);
      aspect-ratio: 1;
      filter: drop-shadow(0 12px 32px rgba(0, 0, 0, 0.45));
    }

    .wheel-wrap::after {
      content: "";
      position: absolute;
      top: -0.35rem;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 16px solid var(--text);
      z-index: 2;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
    }

    #ruleta {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid var(--ring);
    }

    .actions {
      width: 100%;
      max-width: 16rem;
    }

    .intento-msg {
      display: none;
      margin: 0.65rem 0 0;
      padding: 0 0.25rem;
      font-size: 0.8rem;
      line-height: 1.45;
      color: var(--muted);
    }

    .intento-msg.is-visible {
      display: block;
    }

    button {
      width: 100%;
      margin: 0;
      padding: 0.9rem 1.25rem;
      font-size: clamp(1rem, 3vw, 1.1rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(180deg, var(--accent-hover) 0%, var(--accent) 100%);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(220, 38, 38, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow: 0 8px 28px rgba(220, 38, 38, 0.45);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    footer {
      margin-top: auto;
      padding-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .result-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(6px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.22s ease, visibility 0.22s ease;
    }

    .result-backdrop.is-open {
      opacity: 1;
      visibility: visible;
    }

    .result-dialog {
      width: 100%;
      max-width: 22rem;
      padding: 0;
      border: 1px solid var(--ring);
      border-radius: 1.15rem;
      background: var(--bg-elevated);
      color: var(--text);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.55);
      transform: scale(0.94) translateY(8px);
      opacity: 0;
      transition: transform 0.28s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.22s ease;
    }

    .result-backdrop.is-open .result-dialog {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .result-dialog--win {
      border-color: rgba(220, 38, 38, 0.35);
      box-shadow:
        0 0 0 1px rgba(220, 38, 38, 0.12),
        0 24px 48px rgba(0, 0, 0, 0.55);
    }

    .result-head {
      padding: 1.25rem 1.35rem 0.75rem;
      border-radius: 1.15rem 1.15rem 0 0;
      background: linear-gradient(180deg, rgba(220, 38, 38, 0.12) 0%, transparent 100%);
    }

    .result-dialog:not(.result-dialog--win) .result-head {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, transparent 100%);
    }

    .result-kicker {
      margin: 0 0 0.35rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-dialog--win .result-kicker {
      color: #fca5a5;
    }

    .result-title {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .result-body {
      padding: 0 1.35rem 1.35rem;
    }

    .result-premio {
      margin: 0;
      font-size: clamp(1.05rem, 3.8vw, 1.2rem);
      line-height: 1.45;
      color: #e4e4e7;
    }

    .result-actions {
      padding: 0 1.35rem 1.35rem;
    }

    .result-actions button {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <main>
    <h1>Ruleta Tattoo <span>Probá suerte</span></h1>
    <div class="wheel-wrap">
      <canvas id="ruleta" width="320" height="320" aria-label="Ruleta de premios"></canvas>
    </div>
    <div class="actions">
      <button type="button" id="btnGirar">Girar</button>
      <p id="msgIntento" class="intento-msg" role="status"></p>
    </div>
  </main>
  <footer>Promo sujeta a disponibilidad del estudio.</footer>

  <div
    id="resultBackdrop"
    class="result-backdrop"
    role="presentation"
    aria-hidden="true"
  >
    <div
      id="resultDialog"
      class="result-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="resultTitle"
      aria-describedby="resultPremio"
    >
      <div class="result-head">
        <p class="result-kicker" id="resultKicker">Resultado</p>
        <h2 class="result-title" id="resultTitle">Te tocó</h2>
      </div>
      <div class="result-body">
        <p class="result-premio" id="resultPremio"></p>
      </div>
      <div class="result-actions">
        <button type="button" id="resultCerrar">Listo</button>
      </div>
    </div>
  </div>

  <script>
    const opciones = [
      "Seguí participando 😉",
      "Seguí participando 😉",
      "Seguí participando 😉",
      "Tattoo chico gratis",
      "20% DESCUENTO",
      "Tattoo sorpresa",
      "Hacete un tattoo y llevate otro de regalo"
    ];

    const colores = [
      "#18181b", "#27272a", "#3f3f46",
      "#991b1b", "#c2410c", "#ca8a04", "#7f1d1d"
    ];

    const canvas = document.getElementById("ruleta");
    const ctx = canvas.getContext("2d");
    const btnGirar = document.getElementById("btnGirar");
    const resultBackdrop = document.getElementById("resultBackdrop");
    const resultDialog = document.getElementById("resultDialog");
    const resultKicker = document.getElementById("resultKicker");
    const resultTitle = document.getElementById("resultTitle");
    const resultPremio = document.getElementById("resultPremio");
    const resultCerrar = document.getElementById("resultCerrar");
    const msgIntento = document.getElementById("msgIntento");

    /** Un intento por navegador (localStorage). Se puede saltar borrando datos del sitio. */
    const INTENTO_KEY = "dante-ruleta-intento-v1";

    function leerIntento() {
      try {
        return localStorage.getItem(INTENTO_KEY);
      } catch (_) {
        return null;
      }
    }

    function marcarIntento(premio) {
      try {
        localStorage.setItem(INTENTO_KEY, premio);
      } catch (_) {}
    }

    function aplicarYaJugo(premio) {
      btnGirar.disabled = true;
      btnGirar.textContent = "Ya jugaste";
      msgIntento.classList.add("is-visible");
      msgIntento.textContent = premio
        ? `En este dispositivo ya usaste el intento. Te había tocado: «${premio}».`
        : "En este dispositivo ya usaste el intento.";
    }

    let cx = 160;
    let cy = 160;
    let radius = 150;
    let angulo = 0;
    let girando = false;

    function layoutCanvas() {
      const wrap = canvas.parentElement;
      const css = Math.min(wrap.clientWidth, 352);
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const px = Math.round(css * dpr);
      canvas.width = px;
      canvas.height = px;
      canvas.style.width = css + "px";
      canvas.style.height = css + "px";
      cx = px / 2;
      cy = px / 2;
      radius = px / 2 - Math.max(4, px * 0.02);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.font = `${Math.max(10, px * 0.045)}px system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
    }

    function dibujar() {
      const arc = (Math.PI * 2) / opciones.length;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < opciones.length; i++) {
        ctx.beginPath();
        ctx.fillStyle = colores[i % colores.length];
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, arc * i, arc * (i + 1));
        ctx.fill();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(arc * i + arc / 2);
        ctx.fillStyle = "#fafafa";
        const label = opciones[i];
        const maxW = radius * 0.62;
        ctx.fillText(label, radius * 0.52, 0, maxW);
        ctx.restore();
      }
    }

    function pintarConRotacion(aDeg) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate((aDeg * Math.PI) / 180);
      ctx.translate(-cx, -cy);
      dibujar();
      ctx.restore();
    }

    /** Grados en [0, 360). */
    function norm360(deg) {
      return ((deg % 360) + 360) % 360;
    }

    /**
     * Sectores como en canvas: desde el eje +X (3 en punto), sentido horario.
     * El puntero visual está arriba (12 en punto) = 270° en esa convención.
     * rotDeg rota la ruleta en sentido horario (igual que ctx.rotate positivo).
     */
    function indiceBajoPuntero(rotDeg, n, pointerDeg = 270) {
      const sector = 360 / n;
      const p = norm360(pointerDeg);
      const r = norm360(rotDeg);
      for (let j = 0; j < n; j++) {
        const start = norm360(j * sector + r);
        const end = norm360((j + 1) * sector + r);
        if (start < end) {
          if (p >= start && p < end) return j;
        } else {
          if (p >= start || p < end) return j;
        }
      }
      return 0;
    }

    function esPremioSuave(texto) {
      return texto.toLowerCase().includes("seguí participando");
    }

    function abrirResultado(premio) {
      const neutral = esPremioSuave(premio);
      resultDialog.classList.toggle("result-dialog--win", !neutral);
      resultKicker.textContent = neutral ? "Esta vez" : "¡Felicitaciones!";
      resultTitle.textContent = neutral ? "Casi" : "Te tocó";
      resultPremio.textContent = premio;
      resultBackdrop.classList.add("is-open");
      resultBackdrop.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      requestAnimationFrame(() => resultCerrar.focus());
    }

    function cerrarResultado() {
      if (!resultBackdrop.classList.contains("is-open")) return;
      resultBackdrop.classList.remove("is-open");
      resultBackdrop.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      const guardado = leerIntento();
      if (guardado) aplicarYaJugo(guardado);
      else {
        btnGirar.disabled = false;
        btnGirar.focus();
      }
    }

    resultCerrar.addEventListener("click", cerrarResultado);
    resultBackdrop.addEventListener("click", (e) => {
      if (e.target === resultBackdrop) cerrarResultado();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && resultBackdrop.classList.contains("is-open")) {
        e.preventDefault();
        cerrarResultado();
      }
    });

    function girar() {
      if (leerIntento()) return;
      if (girando) return;
      girando = true;
      btnGirar.disabled = true;

      const giroTotal = 2000 + Math.random() * 2500;
      const duracion = 3200;
      let inicio = null;

      function animar(tiempo) {
        if (inicio === null) inicio = tiempo;
        const progreso = Math.min(1, (tiempo - inicio) / duracion);
        const ease = 1 - Math.pow(1 - progreso, 3);
        angulo = (giroTotal * ease) % 360;

        pintarConRotacion(angulo);

        if (progreso < 1) {
          requestAnimationFrame(animar);
        } else {
          const index = indiceBajoPuntero(angulo, opciones.length);
          const premio = opciones[index];
          marcarIntento(premio);
          abrirResultado(premio);
          girando = false;
        }
      }

      requestAnimationFrame(animar);
    }

    function init() {
      layoutCanvas();
      dibujar();
      const prev = leerIntento();
      if (prev) aplicarYaJugo(prev);
    }

    btnGirar.addEventListener("click", girar);

    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (girando) return;
        layoutCanvas();
        dibujar();
      }, 80);
    });

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(init).catch(init);
    } else {
      init();
    }
  </script>
</body>
</html>
