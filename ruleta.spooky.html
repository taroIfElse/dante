<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spooky Tattoo Casino</title>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:#000;
  color:#fff;
}

h1{
  color:#ff0033;
  text-shadow:0 0 15px #ff0033;
}

input,button{
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:12px;
  margin-top:10px;
}

button{
  background:#ff0033;
  color:#fff;
}

#wheelContainer{
  position:relative;
  width:340px;
  height:340px;
  margin:30px auto;
}

#pointer{
  position:absolute;
  top:-18px;
  left:50%;
  transform:translateX(-50%);
  font-size:42px;
  color:gold;
  text-shadow:0 0 15px yellow;
  z-index:5;
}

#wheelCanvas{
  width:100%;
  height:100%;
  border-radius:50%;
  border:10px solid #fff;
  box-shadow:0 0 25px #ff0033;
  transform-origin:50% 50%;
}

/* luces */
.light{
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  background:gold;
  box-shadow:0 0 12px yellow;
  animation:blink 1s infinite alternate;
}

@keyframes blink{
  from{opacity:.3;}
  to{opacity:1;}
}

#result{
  font-size:22px;
  margin-top:20px;
  transition:.3s;
}

.winFlash{
  animation:flash .5s 4;
}

@keyframes flash{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

.form-msg{
  display:none;
  max-width:320px;
  margin:12px auto 0;
  padding:10px 12px;
  font-size:14px;
  line-height:1.4;
  color:#ffb3c1;
  background:#1a0a0e;
  border:1px solid #ff003355;
  border-radius:10px;
}

.form-msg.is-visible{
  display:block;
}

#btnSpin:disabled{
  opacity:.55;
  cursor:not-allowed;
}

#game .form-msg{
  color:#ccc;
  border-color:#333;
  background:#111;
}
</style>
</head>

<body>

<h1>🎰 Spooky Tattoo</h1>

<div id="login">
  <input id="instagram" placeholder="@usuario" autocomplete="username">
  <br>
  <button type="button" onclick="initAudio();start()">Participar</button>
  <p id="msgLogin" class="form-msg" role="status"></p>
</div>

<div id="game" style="display:none;">
  <div id="wheelContainer">
    <div id="pointer">▼</div>
    <canvas id="wheelCanvas" width="340" height="340"></canvas>
  </div>
  <button type="button" id="btnSpin" onclick="spin()">GIRAR</button>
  <p id="msgSpin" class="form-msg" role="status"></p>
</div>

<div id="result"></div>

<script>
let audioCtx;
let rotation=0;
let user="";
let girando=false;

/** Un intento por @ en este navegador (localStorage). Sin servidor. */
const INTENTO_PREFIX="spooky-ruleta-intento-v1:";

function normalizeIg(raw){
  let s=String(raw||"").trim();
  if(s.startsWith("@")) s=s.slice(1);
  return s.toLowerCase();
}

function intentKey(igNorm){
  return INTENTO_PREFIX+igNorm;
}

function yaParticipo(igNorm){
  try{
    return Boolean(localStorage.getItem(intentKey(igNorm)));
  }catch(_){
    return false;
  }
}

function marcarParticipacion(igNorm){
  try{
    localStorage.setItem(intentKey(igNorm),"1");
  }catch(_){}
}

function showLoginMsg(text){
  const el=document.getElementById("msgLogin");
  el.textContent=text;
  el.classList.add("is-visible");
}

function clearLoginMsg(){
  const el=document.getElementById("msgLogin");
  el.textContent="";
  el.classList.remove("is-visible");
}

function showSpinMsg(text){
  const el=document.getElementById("msgSpin");
  el.textContent=text;
  el.classList.add("is-visible");
}

const premios=[
"Seguí participando 😉",
"20% OFF",
"Seguí participando 😉",
"Tattoo GRATIS",
"Seguí participando 😉",
"Tattoo sorpresa",
"Seguí participando 😉",
"2x1 Tattoo"
];

const probabilidades=[35,10,35,3,35,4,35,3];

function initAudio(){
 if(!audioCtx){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
 }
}

function beep(freq,dur,vol=0.03){
 const osc=audioCtx.createOscillator();
 const gain=audioCtx.createGain();
 osc.connect(gain);
 gain.connect(audioCtx.destination);
 osc.frequency.value=freq;
 gain.gain.value=vol;
 osc.start();
 osc.stop(audioCtx.currentTime+dur);
}

function playWin(){
 beep(500,.1,.06);
 setTimeout(()=>beep(700,.15,.06),120);
 setTimeout(()=>beep(900,.2,.06),260);
}

function createLights(){
 const container=document.getElementById("wheelContainer");
 const count=24;
 const radius=165;

 for(let i=0;i<count;i++){
   const light=document.createElement("div");
   light.className="light";

   const angle=(i/count)*Math.PI*2;
   const x=170+Math.cos(angle)*radius;
   const y=170+Math.sin(angle)*radius;

   light.style.left=(x-6)+"px";
   light.style.top=(y-6)+"px";
   light.style.animationDelay=(i*0.08)+"s";

   container.appendChild(light);
 }
}

function start(){
 clearLoginMsg();
 const raw=document.getElementById("instagram").value;
 const igNorm=normalizeIg(raw);

 if(!igNorm){
   showLoginMsg("Ingresá tu usuario de Instagram (con o sin @).");
   return;
 }
 if(yaParticipo(igNorm)){
   showLoginMsg("Ya participaste con ese usuario desde este navegador. Si borrás los datos del sitio se pierde el bloqueo (es a propósito, sin servidor).");
   return;
 }

 user=igNorm;

 document.getElementById("login").style.display="none";
 document.getElementById("game").style.display="block";

 const btn=document.getElementById("btnSpin");
 btn.disabled=false;
 btn.textContent="GIRAR";
 document.getElementById("msgSpin").classList.remove("is-visible");
 document.getElementById("msgSpin").textContent="";

 drawWheel();
 createLights();
}

function drawWheel(){
 const c=document.getElementById("wheelCanvas");
 const ctx=c.getContext("2d");
 const r=c.width/2;
 const a=(Math.PI*2)/premios.length;

 premios.forEach((p,i)=>{
   ctx.beginPath();
   ctx.moveTo(r,r);
   ctx.arc(r,r,r,i*a,(i+1)*a);
   ctx.fillStyle=i%2?"#ff0033":"#111";
   ctx.fill();

   ctx.save();
   ctx.translate(r,r);
   ctx.rotate(i*a+a/2);
   ctx.fillStyle="#fff";
   ctx.font="bold 14px Arial";
   ctx.textAlign="right";
   ctx.fillText(p,r-15,5);
   ctx.restore();
 });
}

function elegirPremio(){
 let total=probabilidades.reduce((a,b)=>a+b,0);
 let rand=Math.random()*total;
 let sum=0;
 for(let i=0;i<probabilidades.length;i++){
   sum+=probabilidades[i];
   if(rand<sum) return i;
 }
 return 0;
}

function spin(){
 if(!user||girando) return;
 if(yaParticipo(user)){
   const btn=document.getElementById("btnSpin");
   btn.disabled=true;
   btn.textContent="Ya jugaste";
   showSpinMsg("Solo un giro por participante en este dispositivo.");
   return;
 }

 girando=true;
 const btn=document.getElementById("btnSpin");
 btn.disabled=true;

 const wheel=document.getElementById("wheelCanvas");
 const index=elegirPremio();
 const deg=360/premios.length;
 const target=360-(index*deg)-deg/2;

 rotation += 360*6 + target;

 wheel.style.transition="transform 5s cubic-bezier(.17,.67,.12,.99)";
 wheel.style.transform=`rotate(${rotation}deg)`;

 let ticks=setInterval(()=>beep(220,.03,.02),120);

 setTimeout(()=>{
   clearInterval(ticks);

   if(navigator.vibrate) navigator.vibrate([120,60,120]);

   playWin();

   const code="SPOOKY-"+Math.floor(Math.random()*10000);

   const result=document.getElementById("result");
   result.classList.add("winFlash");
   result.innerHTML=`
   <p>🎉 Ganaste: <b>${premios[index]}</b></p>
   <p>Código: <b>${code}</b></p>
   <p>Mostralo en @spookytattoo</p>
   <p style="font-size:16px;color:#888;margin-top:12px;">Usuario: <b>@${user}</b></p>`;

   marcarParticipacion(user);
   btn.textContent="Ya jugaste";
   showSpinMsg("Listo: ya usaste tu intento con @"+user+" en este navegador.");
   girando=false;
 },5000);
}
</script>

</body>
</html>
