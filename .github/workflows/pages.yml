name: Desplegar GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Preparar carpeta del sitio
        run: mkdir -p _site && cp index.html _site/

      - name: Subir artefacto estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
